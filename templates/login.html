<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Log in to Krishi Officer — your AI-powered agricultural assistant."
    />
    <title>Login — Krishi Officer</title>
    <link
      rel="shortcut icon"
      href="/static/assets/Logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/static/css/auth.css" />
  </head>
  <body>
    <!-- Animated background -->
    <div class="auth-bg" aria-hidden="true"></div>

    <!-- Header -->
    <header class="auth-header">
      <a href="/" class="auth-logo">
        <img src="/static/assets/Logo.png" alt="Krishi Officer" />
        Krishi Officer
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        🌙
      </button>
    </header>

    <!-- Main -->
    <main class="auth-main">
      <div class="auth-card">
        <!-- Badge -->
        <div class="auth-badge">
          <span class="badge-dot"></span>
          Welcome back, Farmer 🌿
        </div>

        <h1 class="auth-title">Sign In</h1>
        <p class="auth-subtitle">
          Access your crop advisory and farm insights dashboard.
        </p>

        <!-- Global alert -->
        <div class="auth-alert" id="loginAlert" role="alert">
          <span class="auth-alert-icon"></span>
          <span class="auth-alert-msg"></span>
        </div>

        <form class="auth-form" id="loginForm" novalidate>
          <!-- Email -->
          <div class="field-group">
            <label class="field-label" for="email">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">📧</span>
              <input
                class="auth-input"
                type="email"
                id="email"
                name="email"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
            <span class="field-error" id="emailError" aria-live="polite"></span>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon" aria-hidden="true">🔒</span>
              <input
                class="auth-input has-toggle"
                type="password"
                id="password"
                name="password"
                placeholder="Your password"
                autocomplete="current-password"
                required
              />
              <button
                class="pw-toggle"
                type="button"
                data-target="password"
                aria-label="Toggle password visibility"
              >
                👁️
              </button>
            </div>
            <span
              class="field-error"
              id="passwordError"
              aria-live="polite"
            ></span>
          </div>

          <!-- Submit -->
          <button class="auth-btn" type="submit" id="loginBtn">
            <span class="btn-spinner" aria-hidden="true"></span>
            <span class="btn-label">Sign In →</span>
          </button>
        </form>

        <div class="auth-divider">or</div>

        <p class="auth-footer">
          Don't have an account?
          <a href="/signup">Sign up free →</a>
        </p>
      </div>
    </main>

    <footer class="site-footer">
      © 2026 Krishi Officer — Empowering farmers with AI.
    </footer>

    <script src="/static/js/auth-guard.js"></script>
    <script>
      initAuthGuard({ protected: false });
      // Show session-expired notice if redirected from a protected page
      if (new URLSearchParams(location.search).get("expired") === "1") {
        document.addEventListener("DOMContentLoaded", () => {
          const alertBox = document.getElementById("loginAlert");
          if (alertBox) {
            alertBox.className = "auth-alert error show";
            alertBox.querySelector(".auth-alert-icon").textContent = "⚠️";
            alertBox.querySelector(".auth-alert-msg").textContent =
              "Your session expired. Please sign in again.";
          }
        });
      }
    </script>
    <script src="/static/js/auth.js"></script>
  </body>
</html>
